# =============================================================================
# GNU:AEFR 跨平台静态全速编译配置 (Zigbuild + GNULLVM 进化版)
# 核心理念：交叉编译交给 cargo-zigbuild 处理。
# =============================================================================

# -----------------------------------------------------------------------------
# 【64位 Windows 核心平台】
# -----------------------------------------------------------------------------

# 针对 Windows GNULLVM (基于 LLVM 的现代 llvm_MinGwW64)
[target.x86_64-pc-windows-gnullvm]
rustflags = [
    "-C", "link-args=-static",      # 强制静态链接系统库
    "-C", "target-feature=+crt-static" # 静态嵌入 C 运行时 (CRT)
]

# 针对 Windows MSVC (Visual Studio 体系)
[target.x86_64-pc-windows-msvc]
rustflags = [
    "-C", "target-feature=+crt-static" # 开启 /MT 模式，完全脱离 VCRuntime 依赖
]

# -----------------------------------------------------------------------------
# 【32位 Windows 兼容平台 (i686)】
# -----------------------------------------------------------------------------

# 针对 32位 Windows GNULLVM (现代 SEH 适配)
[target.i686-pc-windows-gnullvm]
rustflags = [
    "-C", "link-args=-static",
    "-C", "target-feature=+crt-static"
]

[target.i686-pc-windows-msvc]
rustflags = [
    "-C", "target-feature=+crt-static"
]

# -----------------------------------------------------------------------------
# 【ARM64 Windows 现代平台 (aarch64)】
# -----------------------------------------------------------------------------

# 针对 ARM64 Windows GNULLVM (AEFR 交叉编译的核心目标)
[target.aarch64-pc-windows-gnullvm]
rustflags = [
    "-C", "link-args=-static",
    "-C", "target-feature=+crt-static"
]

[target.aarch64-pc-windows-msvc]
rustflags = [
    "-C", "target-feature=+crt-static"
]

# -----------------------------------------------------------------------------
# 【Linux Musl 静态分发平台】
# -----------------------------------------------------------------------------

# Linux x86_64 Musl
[target.x86_64-unknown-linux-musl]
rustflags = [
    "-C", "target-feature=+crt-static" # 真正的完全静态化，生成的二进制文件无任何外部依赖
]

# Linux i686 Musl
[target.i686-unknown-linux-musl]
rustflags = [
    "-C", "target-feature=+crt-static"
]

# Linux ARM64 Musl
[target.aarch64-unknown-linux-musl]
rustflags = [
    "-C", "target-feature=+crt-static"
]

# -----------------------------------------------------------------------------
# 【macOS 苹果 Darwin 平台】
# -----------------------------------------------------------------------------

# 针对 Apple Silicon (M1/M2/M3 芯片)
[target.aarch64-apple-darwin]
rustflags = [
    "-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup",
]

# 针对 Intel 芯片 Mac
[target.x86_64-apple-darwin]
rustflags = [
    "-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup",
]]

# -----------------------------------------------------------------------------
# 【ARM64 Windows 现代平台 (aarch64)】
# -----------------------------------------------------------------------------

[target.aarch64-pc-windows-gnu]
rustflags = [
    "-C", "link-args=-static",
    "-C", "target-feature=+crt-static"
]

[target.aarch64-pc-windows-msvc]
rustflags = [
    "-C", "target-feature=+crt-static"
]

# -----------------------------------------------------------------------------
# 【Linux Musl 静态分发平台】
# -----------------------------------------------------------------------------

# Linux x86_64 Musl
[target.x86_64-unknown-linux-musl]
rustflags = [
    "-C", "target-feature=+crt-static" # 真正的完全静态化，生成的二进制文件无任何外部依赖
]

# Linux i686 Musl
[target.i686-unknown-linux-musl]
rustflags = [
    "-C", "target-feature=+crt-static"
]

# Linux ARM64 Musl
[target.aarch64-unknown-linux-musl]
rustflags = [
    "-C", "target-feature=+crt-static"
]    "-C", "target-feature=+crt-static"
]

[target.i686-pc-windows-msvc]
linker = "rust-lld"
rustflags = [
    "-C", "linker-flavor=lld-link",
    "-C", "target-feature=+crt-static"
]

# -----------------------------------------------------------------------------
# 【ARM64 Windows 现代平台 (aarch64)】
# 适用场景：Snapdragon X Elite, Surface Pro, Mac 虚拟机
# -----------------------------------------------------------------------------

[target.aarch64-pc-windows-gnu]
linker = "rust-lld"
rustflags = [
    "-C", "linker-flavor=gnu-lld",
    "-C", "link-args=-static",
    "-C", "target-feature=+crt-static"
]

[target.aarch64-pc-windows-msvc]
linker = "rust-lld"
rustflags = [
    "-C", "linker-flavor=lld-link",
    "-C", "target-feature=+crt-static"
]

# -----------------------------------------------------------------------------
# 【Linux Musl 静态分发平台】
# 适用场景：服务器、容器、裸机 Linux，无需安装 glibc 即可运行
# -----------------------------------------------------------------------------

# Linux x86_64 Musl
[target.x86_64-unknown-linux-musl]
linker = "rust-lld"
rustflags = [
    "-C", "linker-flavor=gnu-lld", # [统一] 在 Linux 上同样使用高性能 LLD
    "-C", "target-feature=+crt-static" # [孤勇] 真正的完全静态化，生成的二进制文件无任何外部依赖
]

# Linux i686 Musl (32位老旧 Linux)
[target.i686-unknown-linux-musl]
linker = "rust-lld"
rustflags = [
    "-C", "linker-flavor=gnu-lld",
    "-C", "target-feature=+crt-static"
]

# Linux ARM64 Musl (现代嵌入式/移动端 Linux)
[target.aarch64-unknown-linux-musl]
linker = "rust-lld"
rustflags = [
    "-C", "linker-flavor=gnu-lld",
    "-C", "target-feature=+crt-static"
]
